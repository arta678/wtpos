<script>
function initNavbarQuickSearch() {
  const nav = document.getElementById("navbar");
  if (!nav) return;
  const input = nav.querySelector("#quickSearchInput");
  if (!input || input.dataset.bound) return;
  input.dataset.bound = "1";
  input.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    location.href =
      "h_harga_produk.html?q=" + encodeURIComponent(q);
  });
}
async function loadNavbar() {
  const navEl = document.getElementById("navbar");
  if (localStorage.getItem("navbar")) {
    navEl.innerHTML = localStorage.getItem("navbar");
    navEl.classList.add("loaded");
  }
  const res = await fetch("navbar.html");
  const html = await res.text();
  localStorage.setItem("navbar", html);
  navEl.innerHTML = html;
  navEl.classList.add("loaded");
  if (typeof applyShortcutVisibility === "function") {
    applyShortcutVisibility();
  }
  initNavbarQuickSearch();
}
async function loadShortcut() {
  if (!isShortcutEnabled()) {
    const el = document.getElementById("shortcut");
    if (el) el.style.display = "none";
    return;
  }

  const el = document.getElementById("shortcut");

  if (localStorage.getItem("shortcut_html")) {
    el.innerHTML = localStorage.getItem("shortcut_html");
    applyShortcutIcons(); // ⬅️ WAJIB
  }

  const res = await fetch("shortcut.html");
  const html = await res.text();

  localStorage.setItem("shortcut_html", html);
  el.innerHTML = html;

  applyShortcutIcons(); // ⬅️ WAJIB
}

loadNavbar();
loadShortcut();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db_supabase.js"></script>
<script>
    let filterStatus = "all"; // all | active | nonactive
    async function hapusMerek(id) {
        if (!confirm("YAKIN HAPUS?")) return;

        const { error } = await db
            .from("tb_merek")
            .delete()
            .eq("id_merek", id);

        if (!error) {
            clearCacheMerek(); // 🔥 WAJIB
            loadMerek();
        }
    }

    // let page = parseInt(localStorage.getItem("merek_page") || "1");
    const perPage = 10;
    let lastCount = 0;
    let allMerek = [];
    let page = 1;
    let totalPages = 1;
    let selectedMerekId = null;
    let selectedRow = null;
    let selectedMerekAktif = null;

function setFilterStatus(status) {
    filterStatus = status;
    page = 1;

    const label =
        status === "active" ? "Aktif" :
        status === "nonactive" ? "Nonaktif" :
        "Semua";

    document.getElementById("filterStatusBtn").innerText = label;

    loadMerek();
}

function clearCacheMerek() {
    localStorage.removeItem("cache_merek_all");
}

function renderMerek(list) {
    const tabel_merek = document.getElementById("tabel_merek"); // ⬅️ WAJIB
    if (!list.length) {
        tabel_merek.innerHTML = `
            <tr>
                <td colspan="4" class="text-center text-muted py-3">
                    Tidak ada data
                </td>
            </tr>`;
        return;
    }

        tabel_merek.innerHTML = list.map(m => `
        <tr class="barisdata"
            data-id="${m.id_merek}"
            data-aktif="${m.aktif}">
          <td>${m.kode_merek}</td>
          <td title="${m.nama_merek}">${m.nama_merek}</td>
          <td class="text-center ${m.aktif ? 'text-primary' : 'text-danger'}">
            ${m.aktif ? ICON_CHECK : ICON_SILANG}
          </td>
        </tr>
        `).join("");

}


async function loadMerek() {

    const q = document.getElementById("cari_merek")
        .value.trim().toLowerCase();

    // ===============================
    // 1. LOAD CACHE INSTAN
    // ===============================
    const cache = localStorage.getItem("cache_merek_all");
    if (cache) {
        allMerek = JSON.parse(cache);
        applyFilterMerek(q);

        if (!navigator.onLine) return; // ⛔ stop di cache
    }

    // ===============================
    // 2. FETCH SUPABASE (SEKALI)
    // ===============================
    const { data, error } = await db
        .from("tb_merek")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    allMerek = data;
    localStorage.setItem("cache_merek_all", JSON.stringify(data));
    applyFilterMerek(q);
}

function applyFilterMerek(q) {

    let result = allMerek;

    // filter status
    if (filterStatus === "active") {
        result = result.filter(m => m.aktif === true);
    } else if (filterStatus === "nonactive") {
        result = result.filter(m => m.aktif === false);
    }

    // search
    if (q !== "") {
        result = result.filter(m =>
            (m.nama_merek || "").toLowerCase().includes(q)
        );
    }

    // pagination
    lastCount = result.length;
    totalPages = Math.ceil(lastCount / perPage);

    // ⛔ CEGAH page melewati batas
    if (page > totalPages) page = totalPages;
    if (page < 1) page = 1;

    const start = (page - 1) * perPage;
    const end = start + perPage;

    renderMerek(result.slice(start, end));
    updatePaginationBootstrap();

}

    function nextPage() {
        if (page >= totalPages) return; // ⛔ STOP DI HALAMAN TERAKHIR
        page++;
        applyFilterMerek(
            document.getElementById("cari_merek").value.trim().toLowerCase()
        );
    }

    function prevPage() {
        if (page <= 1) return;
        page--;
        applyFilterMerek(
            document.getElementById("cari_merek").value.trim().toLowerCase()
        );
    }


    function updatePaginationBootstrap() {
        document.getElementById("page-number").innerText = page;

        document.querySelector("#pagination li:first-child")
            .classList.toggle("disabled", page <= 1);

        document.querySelector("#pagination li:last-child")
            .classList.toggle("disabled", page >= totalPages);
    }


document.getElementById("cari_merek").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
        page = 1;
        loadMerek();
    }
});

    function goEdit(id) {
    // simpan halaman sekarang
    localStorage.setItem("merek_page", page);

    // buka halaman edit
    location.href = 'h_merek_edit.html?id=' + id;
}

    loadMerek();
    function isOnline() {
    return navigator.onLine;
}

window.addEventListener("online", () => {
    console.log("🟢 Kembali online");
});

window.addEventListener("offline", () => {
    console.log("🔴 Offline mode");
});

function updateOfflineBadge() {
    const badge = document.getElementById("offlineBadge");
    if (!badge) return;

    badge.classList.toggle("d-none", navigator.onLine);
}

window.addEventListener("online", updateOfflineBadge);
window.addEventListener("offline", updateOfflineBadge);
updateOfflineBadge();

const menu = document.getElementById("contextMenu");

document.addEventListener("contextmenu", function(e){

  const row = e.target.closest(".barisdata");

  if(row){
    e.preventDefault();

    if(selectedRow){
        selectedRow.classList.remove("baris-aktif");
    }

    selectedRow = row;
    selectedRow.classList.add("baris-aktif");

    selectedMerekId = row.dataset.id;
    selectedMerekAktif = row.dataset.aktif === "true";

    const menuToggle = document.getElementById("menuToggleAktif");

    menuToggle.innerText = selectedMerekAktif
        ? "Nonaktifkan"
        : "Aktifkan";

    menu.style.top = e.clientY + "px";
    menu.style.left = e.clientX + "px";
    menu.style.display = "block";
  }else{
    menu.style.display = "none";
  }

});

document.addEventListener("click", function(){
  menu.style.display = "none";
});
function menuEdit(){
    goEdit(selectedMerekId);
}

function menuHapus(){
    hapusMerek(selectedMerekId);
}

async function menuToggleAktif(){
  const statusBaru = !selectedMerekAktif;
  const { error } = await db
      .from("tb_merek")
      .update({ aktif: statusBaru })
      .eq("id_merek", selectedMerekId);
  if(error){
      alert("Gagal mengubah status");
      return;
  }
  selectedMerekAktif = statusBaru;
  selectedRow.dataset.aktif = statusBaru;
  const cell = selectedRow.children[2];
  cell.className = "text-center " + (statusBaru ? "text-primary" : "text-danger");
  cell.innerHTML = statusBaru ? ICON_CHECK : ICON_SILANG;
  clearCacheMerek();
}

document.addEventListener("click", function(e){
  const row = e.target.closest(".barisdata");
  if(row){
    if(selectedRow){
        selectedRow.classList.remove("baris-aktif");
    }
    selectedRow = row;
    selectedRow.classList.add("baris-aktif");
    selectedMerekId = row.dataset.id;
    selectedMerekAktif = row.dataset.aktif === "true";
  }
});

</script>
